<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Week</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  </head>
  <body>
    <script>
      window.supabaseClient = supabase.createClient(
        "https://ywofdvbtcbvkkjxcazlu.supabase.co",

      );

    <main class="layout">
      <section class="panel week-panel" aria-label="Week">
        <div class="panel-titlebar">
          <h1 class="panel-title">week</h1>
          <button class="icon-button" type="button" id="week-prev" aria-label="Previous week">
            ←
          </button>
          <button class="icon-button" type="button" id="week-next" aria-label="Next week">
            →
          </button>
        </div>
        <div class="week-grid">
          <div class="rectangle day-rect" data-day="Monday">
            <div class="day-label">Monday</div>
            <div class="day-tasks" id="day-Monday" aria-label="Monday tasks"></div>
          </div>
          <div class="rectangle day-rect" data-day="Tuesday">
            <div class="day-label">Tuesday</div>
            <div
              class="day-tasks"
              id="day-Tuesday"
              aria-label="Tuesday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Wednesday">
            <div class="day-label">Wednesday</div>
            <div
              class="day-tasks"
              id="day-Wednesday"
              aria-label="Wednesday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Thursday">
            <div class="day-label">Thursday</div>
            <div
              class="day-tasks"
              id="day-Thursday"
              aria-label="Thursday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Friday">
            <div class="day-label">Friday</div>
            <div class="day-tasks" id="day-Friday" aria-label="Friday tasks"></div>
          </div>
          <div class="rectangle day-rect" data-day="Saturday">
            <div class="day-label">Saturday</div>
            <div
              class="day-tasks"
              id="day-Saturday"
              aria-label="Saturday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Sunday">
            <div class="day-label">Sunday</div>
            <div class="day-tasks" id="day-Sunday" aria-label="Sunday tasks"></div>
          </div>
          <div class="rectangle day-rect" data-day="Next week">
            <div class="day-label">Next week</div>
            <div
              class="day-tasks"
              id="day-Next-week"
              aria-label="Next week tasks"
            ></div>
          </div>
        </div>
      </section>

      <section class="panel tasks-panel" aria-label="Tasks">
        <div class="panel-titlebar panel-titlebar-right">
          <h1 class="panel-title">tasks</h1>
          <button class="icon-button" type="button" id="auth-trigger" aria-label="User">
            👤
          </button>
        </div>
        <div
          class="rectangle tasks-field"
          id="tasks-field"
          aria-label="Tasks area"
        ></div>
      </section>
    </main>

    <div class="modal-overlay" id="auth-overlay" hidden>
      <div class="modal rectangle" role="dialog" aria-modal="true" aria-label="Authentication">
        <button type="button" class="modal-close" id="auth-close" aria-label="Close">
          ×
        </button>
        <p id="auth-status" class="auth-status" aria-live="polite"></p>
        <p id="auth-message" class="auth-message" aria-live="polite"></p>
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
        <div class="modal-actions">
          <button type="button" id="auth-signup">Регистрация</button>
          <button type="button" id="auth-login">Вход</button>
          <button type="button" id="logout-button">Logout</button>
        </div>
      </div>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
