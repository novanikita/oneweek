<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oneweek</title>
    <link rel="icon" href="./oneweek-favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./css/colors.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="./js/theme-init.js"></script>
  </head>
  <body>
    <script>
      window.supabaseClient = supabase.createClient(
        "https://ywofdvbtcbvkkjxcazlu.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3b2ZkdmJ0Y2J2a2tqeGNhemx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjQwMjgsImV4cCI6MjA5MDQ0MDAyOH0.n5eglSosCp6M3mH8i559VczJxVFy73t4U6npUPIVxoY"
      );
    </script>

    <main class="layout">
      <header class="panel-titlebar layout-header">
        <button
          class="icon-button"
          type="button"
          id="auth-trigger-mobile"
          aria-label="User"
        >
          <img src="./bar-icon.svg" width="16" height="16" alt="" aria-hidden="true" class="icon-themed" />
        </button>
        <h1 class="panel-title">oneweek by <a href="https://nikitanova.com/en/index.html" class="panel-title-link" target="_blank" rel="noopener">nova</a></h1>
        <button class="icon-button" type="button" id="week-prev" aria-label="Previous week" hidden>
          ←
        </button>
        <button class="icon-button" type="button" id="week-next" aria-label="Next week" hidden>
          →
        </button>
      </header>
      <section class="panel week-panel" aria-label="Week">
        <div class="week-grid">
          <div class="rectangle day-rect" data-day="Monday">
            <div class="day-label">monday</div>
            <div class="day-tasks" id="day-Monday" aria-label="Monday tasks"></div>
          </div>
          <div class="rectangle day-rect" data-day="Tuesday">
            <div class="day-label">tuesday</div>
            <div
              class="day-tasks"
              id="day-Tuesday"
              aria-label="Tuesday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Wednesday">
            <div class="day-label">wednesday</div>
            <div
              class="day-tasks"
              id="day-Wednesday"
              aria-label="Wednesday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Thursday">
            <div class="day-label">thursday</div>
            <div
              class="day-tasks"
              id="day-Thursday"
              aria-label="Thursday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Friday">
            <div class="day-label">friday</div>
            <div class="day-tasks" id="day-Friday" aria-label="Friday tasks"></div>
          </div>
          <div class="rectangle day-rect" data-day="Saturday">
            <div class="day-label">saturday</div>
            <div
              class="day-tasks"
              id="day-Saturday"
              aria-label="Saturday tasks"
            ></div>
          </div>
          <div class="rectangle day-rect" data-day="Sunday">
            <div class="day-label">sunday</div>
            <div class="day-tasks" id="day-Sunday" aria-label="Sunday tasks"></div>
          </div>
          <div class="rectangle day-rect" data-day="Next week">
            <div class="day-label">next week</div>
            <div
              class="day-tasks"
              id="day-Next-week"
              aria-label="Next week tasks"
            ></div>
          </div>
        </div>
      </section>

      <section class="panel tasks-panel" aria-label="Tasks">
        <div class="rectangle tasks-field" id="tasks-field" aria-label="Tasks area">
          <div class="day-label tasks-field-label">tasks</div>
          <div id="tasks-field-root" class="tasks-field-root"></div>
        </div>
      </section>
    </main>

    <div class="sidebar-overlay" id="auth-overlay" hidden></div>
    <nav class="sidebar" id="sidebar" aria-label="Menu" hidden>
      <button type="button" class="sidebar-close" id="auth-close" aria-label="Close">×</button>
      <div class="sidebar-content">
        <p id="auth-message" class="auth-message" aria-live="polite"></p>

        <div class="sidebar-section">
          <p class="sidebar-section-title">Themes</p>
          <select id="theme-select" class="sidebar-select"></select>
          <button type="button" id="theme-delete" class="sidebar-delete-btn" hidden>Delete theme</button>
          <div id="theme-custom-fields" class="theme-custom-fields" hidden>
            <label class="sidebar-label" for="theme-custom-name">Name</label>
            <input
              id="theme-custom-name"
              class="sidebar-input"
              type="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="My theme"
            />
            <label class="sidebar-label" for="theme-color-text">Text</label>
            <input
              id="theme-color-text"
              class="sidebar-input"
              type="text"
              inputmode="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="#000000"
            />
            <label class="sidebar-label" for="theme-color-background">Background</label>
            <input
              id="theme-color-background"
              class="sidebar-input"
              type="text"
              inputmode="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="#ffffff"
            />
            <div class="sidebar-actions">
              <button type="button" id="theme-apply">Save</button>
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <p class="sidebar-section-title">Weeks</p>
          <ul id="weeks-list" class="weeks-list"></ul>
        </div>

        <div class="sidebar-section">
          <p id="auth-status" class="auth-status" aria-live="polite"></p>
          <div id="auth-account-guest" class="auth-account-panel">
            <input id="email" class="sidebar-input" placeholder="Email" />
            <input id="password" class="sidebar-input" type="password" placeholder="Password" />
            <div class="sidebar-actions">
              <button type="button" id="auth-signup">Sign up</button>
              <button type="button" id="auth-login">Login</button>
            </div>
          </div>
          <div id="auth-account-signed-in" class="auth-account-panel" hidden>
            <div class="sidebar-actions">
              <button type="button" id="logout-button">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <script src="./js/script.js"></script>
  </body>
</html>
